apiVersion: apps/v1
kind: Deployment
metadata:
  name: docmind-ui
  namespace: docmind
spec:
  replicas: 2
  selector: {matchLabels: {app: docmind-ui}}
  template:
    metadata:
      labels: {app: docmind-ui}
    spec:
      containers:
        - name: ui
          image: REPLACE_ACR.azurecr.io/docmind-ui:latest
          imagePullPolicy: Always
          ports: [{containerPort: 80}]
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits:   {cpu: 200m, memory: 128Mi}
---
apiVersion: v1
kind: Service
metadata: {name: docmind-ui, namespace: docmind}
spec:
  selector: {app: docmind-ui}
  ports: [{port: 80, targetPort: 80}]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: docmind-ingress
  namespace: docmind
  annotations:
    kubernetes.io/ingress.class: webapprouting.kubernetes.azure.com
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: {name: docmind-ui, port: {number: 80}}
